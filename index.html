<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader Musik - Cepat & Gratis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #f5f5f5; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 16px; padding: 30px; max-width: 450px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
        h1 { color: #ff0000; font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
        input, select { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 10px; font-size: 15px; outline: none; transition: 0.3s; margin-bottom: 16px; background: white; }
        input:focus, select:focus { border-color: #ff0000; }
        button { width: 100%; padding: 14px; background: #ff0000; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #cc0000; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .result { margin-top: 20px; padding: 16px; background: #fff5f5; border-radius: 10px; display: none; }
        .error { color: #d32f2f; font-size: 14px; margin-top: 16px; display: none; word-break: break-word; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .download-btn { display: inline-block; margin-top: 12px; padding: 10px 24px; background: #2e7d32; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .footer { margin-top: 24px; font-size: 12px; color: #999; }
        .thumb { width: 100%; max-width: 320px; border-radius: 8px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Downloader Musik</h1>
        <p class="subtitle">Unduh MP3/MP4 dari YouTube dengan Cepat</p>
        
        <input type="text" id="urlInput" placeholder="Tempel link YouTube di sini..." autocomplete="off">
        
        <select id="formatSelect">
            <option value="audio">🎧 Audio (MP3)</option>
            <option value="video">🎬 Video (MP4)</option>
        </select>
        
        <button id="searchBtn" onclick="handleDownload()">Mulai Unduh</button>
        
        <div class="error" id="errorMsg"></div>
        <div class="result" id="resultBox">
            <img id="thumbnail" class="thumb" src="" alt="" style="display:none;">
            <p id="videoTitle" style="font-weight:bold; margin-bottom:8px; word-break: break-word;"></p>
            <a id="downloadLink" class="download-btn" href="#" target="_blank" rel="noopener noreferrer">⬇️ Download Sekarang</a>
        </div>
        
        <div class="footer">
            Powered by Cobalt Community API • Aman & Tanpa Iklan
        </div>
    </div>

    <script>
        // Daftar community instance Cobalt (tanpa Turnstile, YouTube aktif)
        const API_INSTANCES = [
            'https://api.cobalt.blackcat.sweeux.org',
            'https://cobaltapi.kittycat.boo',
            'https://dog.kittycat.boo',
            'https://rue-cobalt.xenon.zone'
        ];

        async function tryFetch(instances, index, options) {
            if (index >= instances.length) {
                throw new Error('Semua server tidak merespons. Coba lagi nanti.');
            }
            try {
                const response = await fetch(instances[index] + '/', {
                    ...options,
                    signal: AbortSignal.timeout(15000)
                });
                if (!response.ok && response.status !== 200) {
                    throw new Error('HTTP ' + response.status);
                }
                return response;
            } catch (err) {
                console.warn(`Instance ${instances[index]} gagal:`, err.message);
                return tryFetch(instances, index + 1, options);
            }
        }

        async function handleDownload() {
            const url = document.getElementById('urlInput').value.trim();
            const format = document.getElementById('formatSelect').value;
            const btn = document.getElementById('searchBtn');
            const errorEl = document.getElementById('errorMsg');
            const resultEl = document.getElementById('resultBox');
            
            errorEl.style.display = 'none';
            resultEl.style.display = 'none';
            
            if (!url) {
                showError('Masukkan link YouTube terlebih dahulu!');
                return;
            }

            const ytRegex = /^(https?:\/\/)?(www\.)?(youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)[a-zA-Z0-9_-]+/;
            if (!ytRegex.test(url)) {
                showError('Format link YouTube tidak valid!');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Sedang Memproses...';

            try {
                const requestBody = {
                    url: url,
                    downloadMode: format === 'audio' ? 'audio' : 'auto',
                    videoQuality: '720',
                    audioFormat: 'mp3',
                    audioBitrate: '128',
                    filenameStyle: 'basic'
                };

                const response = await tryFetch(API_INSTANCES, 0, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });
                
                const data = await response.json();
                console.log('Response:', data);
                
                if (data.status === 'tunnel' || data.status === 'redirect') {
                    showResult(data.filename || 'File berhasil diproses!', data.url);
                } else if (data.status === 'picker' && data.audio && data.picker) {
                    if (format === 'audio') {
                        showResult(data.audio.filename || 'Audio berhasil diproses!', data.audio.url);
                    } else if (data.picker.length > 0) {
                        showResult('Video berhasil diproses!', data.picker[0].url);
                    } else {
                        showError('Tidak ada file yang tersedia.');
                    }
                } else if (data.status === 'error') {
                    const errMsg = data.error?.code || data.text || 'Video tidak dapat diproses.';
                    showError(errMsg);
                } else if (data.url) {
                    showResult('File berhasil diproses!', data.url);
                } else {
                    showError('Response tidak dikenali. Coba lagi.');
                }
            } catch (err) {
                console.error('Error:', err);
                showError('Gagal: ' + err.message);
            } finally {
                resetButton();
            }
        }

        function showResult(title, downloadUrl) {
            document.getElementById('videoTitle').textContent = title;
            document.getElementById('downloadLink').href = downloadUrl;
            
            // Coba tampilkan thumbnail dari URL YouTube
            const urlInput = document.getElementById('urlInput').value.trim();
            const videoId = extractVideoId(urlInput);
            const thumbEl = document.getElementById('thumbnail');
            if (videoId) {
                thumbEl.src = 'https://img.youtube.com/vi/' + videoId + '/hqdefault.jpg';
                thumbEl.style.display = 'block';
            } else {
                thumbEl.style.display = 'none';
            }
            
            document.getElementById('resultBox').style.display = 'block';
        }

        function extractVideoId(url) {
            const match = url.match(/(?:v=|youtu\.be\/|shorts\/)([a-zA-Z0-9_-]{11})/);
            return match ? match[1] : null;
        }

        function showError(msg) {
            document.getElementById('errorMsg').textContent = '❌ ' + msg;
            document.getElementById('errorMsg').style.display = 'block';
        }

        function resetButton() {
            const btn = document.getElementById('searchBtn');
            btn.disabled = false;
            btn.textContent = 'Mulai Unduh';
        }

        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleDownload();
        });
    </script>
</body>
</html>
