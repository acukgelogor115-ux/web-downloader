<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader Pro 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #f5f5f5; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 16px; padding: 30px; max-width: 450px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
        h1 { color: #ff0000; font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
        input, select { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 10px; font-size: 15px; outline: none; transition: 0.3s; margin-bottom: 16px; background: white; }
        input:focus, select:focus { border-color: #ff0000; }
        button { width: 100%; padding: 14px; background: #ff0000; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #cc0000; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .result { margin-top: 20px; padding: 16px; background: #fff5f5; border-radius: 10px; display: none; }
        .error { color: #d32f2f; font-size: 14px; margin-top: 16px; display: none; word-break: break-word; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .download-btn { display: inline-block; margin-top: 12px; padding: 10px 24px; background: #2e7d32; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 YouTube Downloader Pro</h1>
        <p class="subtitle">MP4 / MP3 • Powered by Cobalt API 2026</p>
        
        <!-- URL default untuk testing -->
        <input type="text" id="urlInput" placeholder="Tempel link YouTube di sini..." autocomplete="off" value="https://www.youtube.com/watch?v=dQw4W9WgXcQ">
        
        <select id="formatSelect">
            <option value="video"> Video (MP4)</option>
            <option value="audio">🎧 Audio (MP3)</option>
        </select>
        
        <button id="searchBtn" onclick="handleDownload()">Cari Video</button>
        
        <div class="error" id="errorMsg"></div>
        <div class="result" id="resultBox">
            <p id="videoTitle" style="font-weight:bold; margin-bottom:8px; word-break: break-word;"></p>
            <a id="downloadLink" class="download-btn" href="#" target="_blank" rel="noopener noreferrer">⬇️ Download Sekarang</a>
        </div>
    </div>

    <script>
        async function handleDownload() {
            const url = document.getElementById('urlInput').value.trim();
            const format = document.getElementById('formatSelect').value;
            const btn = document.getElementById('searchBtn');
            const errorEl = document.getElementById('errorMsg');
            const resultEl = document.getElementById('resultBox');
            
            errorEl.style.display = 'none';
            resultEl.style.display = 'none';
            
            if (!url) {
                showError('Masukkan link YouTube terlebih dahulu!');
                return;
            }

            // Validasi sederhana format YouTube
            const ytRegex = /^(https?:\/\/)?(www\.)?(youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)[a-zA-Z0-9_-]{11}/;
            if (!ytRegex.test(url)) {
                showError('Format link YouTube tidak valid!');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Memproses...';

            try {
                // Menggunakan Cobalt API Alternative Instance (Lebih stabil di Indonesia)
                const response = await fetch('https://co.wuk.sh/api/json', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        url: url,
                        vQuality: "720",
                        filenamePattern: "basic",
                        isAudioOnly: format === 'audio',
                        audioFormat: "mp3"
                    })
                });
                
                const data = await response.json();
                
                if (data.status === 'stream' || data.status === 'redirect') {
                    showResult('Video Siap Diunduh!', data.url);
                } else if (data.status === 'error') {
                    showError(data.text || 'Video tidak dapat diproses.');
                } else {
                    showError('Terjadi kesalahan pada server pengunduh.');
                }
            } catch (err) {
                console.error(err);
                showError('Gagal terhubung ke API. Coba lagi nanti atau gunakan jaringan lain.');
            } finally {
                resetButton();
            }
        }

        function showResult(title, downloadUrl) {
            document.getElementById('videoTitle').textContent = title;
            document.getElementById('downloadLink').href = downloadUrl;
            document.getElementById('resultBox').style.display = 'block';
        }

        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorMsg').style.display = 'block';
        }

        function resetButton() {
            const btn = document.getElementById('searchBtn');
            btn.disabled = false;
            btn.textContent = 'Cari Video';
        }

        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleDownload();
        });
    </script>
</body>
</html>
