<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader - Piped API</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; text-align: center; }
        input { width: 85%; padding: 14px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { background: #ff0000; color: white; border: none; padding: 14px 40px; border-radius: 10px; font-size: 17px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #cc0000; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 25px; color: #333; word-break: break-all; line-height: 1.6; }
        .download-btn { display: inline-block; margin-top: 15px; padding: 12px 25px; background: #28a745; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .error { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
    <h2>🎵 YouTube Downloader</h2>
    <p>Masukkan link video YouTube:</p>
    
    <input type="text" id="urlInput" placeholder="https://youtube.com/watch?v=...">
    <br>
    <button id="btnDownload" onclick="getVideoInfo()">Cari Video</button>
    
    <div id="status"></div>

    <script>
        async function getVideoInfo() {
            const url = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById('btnDownload');
            const status = document.getElementById('status');
            
            if (!url || !url.includes('youtube.com') && !url.includes('youtu.be')) {
                alert("Masukkan link YouTube yang valid!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Mencari...";
            status.innerHTML = "⏳ Sedang mengambil informasi dari YouTube...";

            try {
                // Menggunakan Piped API (Instance publik yang mendukung CORS)
                const videoId = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
                const response = await fetch(`https://pipedapi.kavin.rocks/streams/${videoId}`);
                
                if (!response.ok) throw new Error('Video tidak ditemukan atau diblokir');
                
                const data = await response.json();
                
                // Cari stream video terbaik (biasanya index terakhir atau yang tertinggi)
                // Untuk simplifikasi, kita ambil audio+video muxed pertama atau video stream
                let downloadUrl = '';
                let formatName = 'MP4';
                
                // Coba cari video stream yang ada audio (muxed)
                const muxedStream = data.videoStreams?.find(s => s.mimeType === 'video/mp4' && s.quality === '360p');
                const bestStream = data.videoStreams?.find(s => s.mimeType === 'video/mp4');
                
                if (muxedStream) {
                    downloadUrl = muxedStream.url;
                    formatName = 'MP4 360p (Ada Suara)';
                } else if (bestStream) {
                    downloadUrl = bestStream.url;
                    formatName = `MP4 ${bestStream.quality}`;
                } else {
                    // Fallback ke audio jika tidak ada video stream
                    const audioStream = data.audioStreams?.[0];
                    if (audioStream) {
                        downloadUrl = audioStream.url;
                        formatName = 'Audio M4A';
                    }
                }

                if (downloadUrl) {
                    status.innerHTML = `
                        ✅ <b>${data.title}</b><br>
                        Format: ${formatName}<br>
                        <a href="${downloadUrl}" class="download-btn" target="_blank" download>Klik Untuk Unduh</a>
                    `;
                } else {
                    status.innerHTML = `<span class="error">❌ Tidak menemukan format unduhan yang kompatibel.</span>`;
                }

            } catch (err) {
                status.innerHTML = `<span class="error">❌ Gagal: ${err.message}<br><small>Coba link lain atau tunggu sebentar.</small></span>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Cari Video";
            }
        }
    </script>
</body>
</html>
