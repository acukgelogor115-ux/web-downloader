<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5f5f5; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 16px; padding: 30px; max-width: 450px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
        h1 { color: #ff0000; font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
        input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 10px; font-size: 15px; outline: none; transition: 0.3s; margin-bottom: 16px; }
        input:focus { border-color: #ff0000; }
        button { width: 100%; padding: 14px; background: #ff0000; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #cc0000; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .result { margin-top: 20px; padding: 16px; background: #fff5f5; border-radius: 10px; display: none; }
        .error { color: #d32f2f; font-size: 14px; margin-top: 16px; display: none; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .download-btn { display: inline-block; margin-top: 12px; padding: 10px 24px; background: #2e7d32; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .format-select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 14px; margin-bottom: 16px; outline: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 YouTube Downloader Pro</h1>
        <p class="subtitle">MP4 / MP3 • Resolusi & Ukuran File Lengkap</p>
        
        <input type="text" id="urlInput" placeholder="Tempel link YouTube di sini..." autocomplete="off">
        
        <select id="formatSelect" class="format-select">
            <option value="video">🎬 Video (MP4)</option>
            <option value="audio">🎧 Audio (MP3/M4A)</option>
        </select>
        
        <button id="searchBtn" onclick="handleDownload()">Cari Video</button>
        
        <div class="error" id="errorMsg"></div>
        <div class="result" id="resultBox">
            <p id="videoTitle" style="font-weight:bold; margin-bottom:8px; word-break: break-word;"></p>
            <a id="downloadLink" class="download-btn" href="#" target="_blank">⬇️ Download Sekarang</a>
        </div>
    </div>

    <script>
        // Daftar instance Piped publik (fallback jika satu down)
        const PIPED_INSTANCES = [
            'https://pipedapi.kavin.rocks',
            'https://api.piped.projectsegfau.lt',
            'https://piped-api.privacy.com.de'
        ];

        async function handleDownload() {
            const url = document.getElementById('urlInput').value.trim();
            const format = document.getElementById('formatSelect').value;
            const btn = document.getElementById('searchBtn');
            const errorEl = document.getElementById('errorMsg');
            const resultEl = document.getElementById('resultBox');
            
            errorEl.style.display = 'none';
            resultEl.style.display = 'none';
            
            // Ekstrak Video ID dari berbagai format URL YouTube
            let videoId = '';
            try {
                if (url.includes('youtu.be/')) {
                    videoId = url.split('youtu.be/')[1].split('?')[0];
                } else if (url.includes('youtube.com/watch')) {
                    const urlObj = new URL(url);
                    videoId = urlObj.searchParams.get('v');
                } else if (url.includes('youtube.com/shorts/')) {
                    videoId = url.split('shorts/')[1].split('?')[0];
                }
            } catch (e) {
                showError('Format URL tidak valid!');
                return;
            }

            if (!videoId || videoId.length !== 11) {
                showError('Masukkan link YouTube yang valid!');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Memproses...';

            let lastError = '';
            
            // Coba setiap instance Piped sampai berhasil
            for (const instance of PIPED_INSTANCES) {
                try {
                    const response = await fetch(`${instance}/streams/${videoId}`);
                    
                    if (!response.ok) continue;
                    
                    const data = await response.json();
                    
                    if (!data.title) continue;

                    let downloadUrl = '';
                    let qualityLabel = '';

                    if (format === 'audio') {
                        // Ambil audio stream terbaik
                        const audioStreams = data.audioStreams || [];
                        if (audioStreams.length > 0) {
                            // Urutkan berdasarkan bitrate tertinggi
                            audioStreams.sort((a, b) => (b.bitrate || 0) - (a.bitrate || 0));
                            downloadUrl = audioStreams[0].url;
                            qualityLabel = `${audioStreams[0].bitrate ? Math.round(audioStreams[0].bitrate/1000) + 'kbps' : 'Audio'} • ${audioStreams[0].mimeType?.split('/')[1]?.split(';')[0] || 'm4a'}`;
                        }
                    } else {
                        // Ambil video stream 720p atau yang terdekat
                        const videoStreams = (data.videoStreams || []).filter(s => s.quality && !s.quality.includes('audio'));
                        let bestStream = videoStreams.find(s => s.quality === '720p') || 
                                        videoStreams.find(s => s.quality === '480p') ||
                                        videoStreams[0];
                        
                        if (bestStream) {
                            downloadUrl = bestStream.url;
                            qualityLabel = `${bestStream.quality} • ${bestStream.mimeType?.split('/')[1]?.split(';')[0] || 'mp4'}`;
                        }
                    }

                    if (!downloadUrl) {
                        throw new Error('Tidak ditemukan stream yang sesuai');
                    }

                    // Tampilkan hasil
                    document.getElementById('videoTitle').innerHTML = 
                        `<strong>${data.title}</strong><br><small style="color:#666">${qualityLabel}</small>`;
                    document.getElementById('downloadLink').href = downloadUrl;
                    resultEl.style.display = 'block';
                    
                    // Reset tombol dan keluar dari loop
                    btn.disabled = false;
                    btn.textContent = 'Cari Video';
                    return;

                } catch (err) {
                    lastError = err.message;
                    continue; // Coba instance berikutnya
                }
            }

            // Jika semua instance gagal
            showError('Semua server sedang sibuk. Coba lagi nanti.');
            btn.disabled = false;
            btn.textContent = 'Cari Video';
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = '❌ ' + msg;
            el.style.display = 'block';
        }

        // Support tekan Enter untuk submit
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleDownload();
        });
    </script>
</body>
</html>
