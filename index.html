<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5f5f5; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 16px; padding: 30px; max-width: 450px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
        h1 { color: #ff0000; font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
        input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 10px; font-size: 15px; outline: none; transition: 0.3s; margin-bottom: 16px; }
        input:focus { border-color: #ff0000; }
        button { width: 100%; padding: 14px; background: #ff0000; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #cc0000; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .result { margin-top: 20px; padding: 16px; background: #fff5f5; border-radius: 10px; display: none; }
        .error { color: #d32f2f; font-size: 14px; margin-top: 16px; display: none; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .download-btn { display: inline-block; margin-top: 12px; padding: 10px 24px; background: #2e7d32; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .format-select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 14px; margin-bottom: 16px; outline: none; background: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 YouTube Downloader Pro</h1>
        <p class="subtitle">MP4 / MP3 • Resolusi & Ukuran File Lengkap</p>
        
        <input type="text" id="urlInput" placeholder="Tempel link YouTube di sini..." autocomplete="off">
        
        <select id="formatSelect" class="format-select">
            <option value="video">🎬 Video (MP4)</option>
            <option value="audio">🎧 Audio (MP3)</option>
        </select>
        
        <button id="searchBtn" onclick="handleDownload()">Cari Video</button>
        
        <div class="error" id="errorMsg"></div>
        <div class="result" id="resultBox">
            <p id="videoTitle" style="font-weight:bold; margin-bottom:8px; word-break: break-word;"></p>
            <a id="downloadLink" class="download-btn" href="#" target="_blank">⬇️ Download Sekarang</a>
        </div>
    </div>

    <script>
        // Daftar API publik alternatif dengan parameter yang diperbarui
        const API_ENDPOINTS = [
            { 
                url: 'https://api.cobalt.tools/api/json',
                method: 'POST',
                headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                body: (youtubeUrl, format) => JSON.stringify({
                    url: youtubeUrl,
                    vQuality: '720',
                    filenamePattern: 'basic',
                    downloadMode: format === 'audio' ? 'audio' : 'video'
                }),
                parse: (data) => data.url ? { url: data.url, title: data.text || 'Konten berhasil diproses!' } : null
            },
            {
                url: 'https://api.savetube.me/download',
                method: 'GET',
                headers: {},
                body: null,
                getUrl: (youtubeUrl, format) => `https://api.savetube.me/download?url=${encodeURIComponent(youtubeUrl)}&format=${format}`,
                parse: (data) => data.status === 'success' ? { url: data.download_url, title: data.title || 'Download Siap!' } : null
            }
        ];

        async function handleDownload() {
            const url = document.getElementById('urlInput').value.trim();
            const format = document.getElementById('formatSelect').value;
            const btn = document.getElementById('searchBtn');
            const errorEl = document.getElementById('errorMsg');
            const resultEl = document.getElementById('resultBox');
            
            errorEl.style.display = 'none';
            resultEl.style.display = 'none';
            
            if (!url) {
                showError('Masukkan link terlebih dahulu!');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Memproses...';

            // Looping untuk mencoba setiap API secara otomatis jika salah satu sibuk
            for (const api of API_ENDPOINTS) {
                try {
                    let response;
                    if (api.method === 'POST') {
                        response = await fetch(api.url, {
                            method: 'POST',
                            headers: api.headers,
                            body: api.body(url, format)
                        });
                    } else if (api.getUrl) {
                        response = await fetch(api.getUrl(url, format));
                    }

                    if (!response || !response.ok) continue;
                    
                    const data = await response.json();
                    const result = api.parse(data);
                    
                    if (result) {
                        showResult(result.title, result.url);
                        resetButton();
                        return; 
                    }
                } catch (err) {
                    console.log(`Server alternatif mencoba menghubungkan...`);
                    continue; 
                }
            }

            showError('Semua server sedang sibuk. Silakan coba beberapa saat lagi.');
            resetButton();
        }

        function showResult(title, downloadUrl) {
            document.getElementById('videoTitle').textContent = title;
            document.getElementById('downloadLink').href = downloadUrl;
            document.getElementById('resultBox').style.display = 'block';
        }

        function showError(msg) {
            document.getElementById('errorMsg').textContent = ' ' + msg;
            document.getElementById('errorMsg').style.display = 'block';
        }

        function resetButton() {
            const btn = document.getElementById('searchBtn');
            btn.disabled = false;
            btn.textContent = 'Cari Video';
        }

        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleDownload();
        });
    </script>
</body>
</html>
