<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Downloader - Client Side</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; text-align: center; }
        input { width: 80%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { background: #007bff; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:disabled { background: #ccc; }
        #status { margin-top: 20px; color: #555; word-break: break-all; }
        a.download-link { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #28a745; color: white; text-decoration: none; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>🎵 Web Downloader (GitHub Pages)</h2>
    <p>Masukkan link YouTube/TikTok/IG:</p>
    
    <input type="text" id="urlInput" placeholder="Tempel link di sini...">
    <br>
    <button id="btnDownload" onclick="startDownload()">Unduh Sekarang</button>
    
    <div id="status"></div>

    <script>
        async function startDownload() {
            const url = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById('btnDownload');
            const status = document.getElementById('status');
            
            if (!url) {
                alert("Masukkan URL dulu!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Sedang Memproses...";
            status.innerHTML = "⏳ Mengambil informasi video...";

            try {
                // Menggunakan API publik gratis (Cobalt API / Instance lain)
                // Catatan: API publik sering berubah. Ini contoh menggunakan instance cobalt.tools
                const response = await fetch(`https://api.cobalt.tools/api/json`, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url: url,
                        filenamePattern: "basic",
                        isAudioOnly: false
                    })
                });

                const data = await response.json();

                if (data.url) {
                    status.innerHTML = `✅ Siap diunduh!<br><a href="${data.url}" class="download-link" target="_blank" download>Klik Untuk Unduh File</a>`;
                } else if (data.text) {
                    status.innerHTML = ` Error: ${data.text}`;
                } else {
                    status.innerHTML = "❌ Tidak bisa memproses link ini. Coba link lain.";
                }
            } catch (err) {
                status.innerHTML = `❌ Gagal menghubungi server: ${err.message}<br><small>Coba lagi nanti atau gunakan link yang berbeda.</small>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Unduh Sekarang";
            }
        }
    </script>
</body>
</html>
